<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Logo DGETI-SEP">
  <!-- Gear body -->
  <circle cx="50" cy="58" r="30" fill="#7E0C12"/>
  <!-- 10 gear teeth (rotated rectangles) -->
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(0 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(36 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(72 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(108 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(144 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(180 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(216 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(252 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(288 50 58)"/>
  <rect x="47" y="25" width="6" height="8" rx="2" fill="#7E0C12" transform="rotate(324 50 58)"/>
  <!-- Inner white circle -->
  <circle cx="50" cy="58" r="22" fill="white"/>
  <circle cx="50" cy="58" r="22" fill="none" stroke="#7E0C12" stroke-width="1.5"/>
  <!-- DG text -->
  <text x="50" y="54" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" font-family="Arial Black,Arial,sans-serif" fill="#7E0C12">DG</text>
  <!-- Divider -->
  <line x1="30" y1="58" x2="70" y2="58" stroke="#7E0C12" stroke-width="1.5"/>
  <!-- ETI text -->
  <text x="50" y="69" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="900" font-family="Arial Black,Arial,sans-serif" fill="#7E0C12">ETI</text>
  <!-- SEP arrow banner -->
  <path d="M28 3 H66 L79 14 L66 25 H28 V3 Z" fill="#7E0C12"/>
  <text x="51" y="16" text-anchor="middle" dominant-baseline="middle" font-size="10" font-style="italic" font-family="Arial,sans-serif" fill="white">sep</text>
</svg>
